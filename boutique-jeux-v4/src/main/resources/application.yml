spring:
  application:
    name: boutique-jeux

  datasource:
    url: jdbc:mysql://localhost:3306/Micromania?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 16

  mvc:
    format:
      date: iso
      date-time: iso

  security:
    user:
      name: admin
      password: disabled

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars-secret}
    expiration: 86400000
    refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

logging:
  level:
    root: INFO
    com.monprojet.boutiquejeux: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

server:
  port: 8080
  servlet:
    context-path: /
