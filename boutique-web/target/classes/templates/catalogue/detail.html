<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html(${produit?.get('titre')} ?: 'Produit', ~{::main})}">
<main>
<div class="container py-4" th:if="${produit != null}">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/catalogue}">Catalogue</a></li>
            <li class="breadcrumb-item active" th:text="${produit.get('titre')}">–</li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Image -->
        <div class="col-md-4 text-center">
            <div class="card p-4">
                <img th:if="${produit.get('imageUrl') != null}" th:src="${produit.get('imageUrl')}"
                     class="img-fluid" style="max-height:280px;object-fit:contain" alt=""/>
                <i class="bi bi-controller display-1 text-muted" th:unless="${produit.get('imageUrl') != null}"></i>
            </div>
        </div>

        <!-- Infos -->
        <div class="col-md-8">
            <div class="text-muted small mb-1" th:text="${produit.get('plateforme')}">–</div>
            <h2 class="fw-bold" th:text="${produit.get('titre')}">–</h2>
            <div class="text-muted mb-3" th:text="${produit.get('editeur')}">–</div>

            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="display-6 fw-bold" th:text="${produit.get('prix')} + ' €'">–</div>
                <span th:if="${produit.get('noteMoyenne') != null}" class="badge bg-warning text-dark fs-6">
                    <i class="bi bi-star-fill me-1"></i><span th:text="${produit.get('noteMoyenne')}">–</span>/5
                </span>
                <span class="badge bg-success" th:if="${produit.get('stockDisponible')}">En stock</span>
                <span class="badge bg-secondary" th:unless="${produit.get('stockDisponible')}">Rupture</span>
            </div>

            <div class="mb-4" th:if="${produit.get('description') != null}">
                <p class="text-muted" th:text="${produit.get('description')}">–</p>
            </div>

            <div class="d-flex gap-2 flex-wrap" th:if="${session.jwt != null}">
                <form th:action="@{/panier/ajouter}" method="post">
                    <input type="hidden" name="produitId" th:value="${produit.get('id')}"/>
                    <input type="hidden" name="quantite" value="1"/>
                    <button type="submit" class="btn btn-purple" th:disabled="${!produit.get('stockDisponible')}">
                        <i class="bi bi-cart-plus me-2"></i>Ajouter au panier
                    </button>
                </form>
                <a th:href="@{/garanties/verifier(produitId=${produit.get('id')})}" class="btn btn-outline-secondary">
                    <i class="bi bi-shield-check me-1"></i>Vérifier garantie
                </a>
            </div>
            <div th:unless="${session.jwt != null}">
                <a th:href="@{/auth/login}" class="btn btn-purple">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter pour acheter
                </a>
            </div>

            <!-- Détails techniques -->
            <div class="mt-4">
                <div class="row g-2 text-muted small">
                    <div class="col-6" th:if="${produit.get('categorie') != null}">
                        <span class="fw-semibold text-dark">Catégorie :</span> <span th:text="${produit.get('categorie')}">–</span>
                    </div>
                    <div class="col-6" th:if="${produit.get('dateParution') != null}">
                        <span class="fw-semibold text-dark">Parution :</span> <span th:text="${produit.get('dateParution')}">–</span>
                    </div>
                    <div class="col-6" th:if="${produit.get('pegi') != null}">
                        <span class="fw-semibold text-dark">PEGI :</span> <span th:text="${produit.get('pegi')}">–</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container py-5 text-center text-muted" th:unless="${produit != null}">
    <i class="bi bi-exclamation-circle fs-1 d-block mb-2"></i>
    Produit introuvable.
    <div class="mt-2"><a th:href="@{/catalogue}" class="btn btn-outline-secondary btn-sm">Retour au catalogue</a></div>
</div>
</main>
</html>
