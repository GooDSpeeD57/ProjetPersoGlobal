<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Promotions', ~{::main})}">
<main>
<div class="d-flex" style="min-height:calc(100vh - 56px)">
    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-tag me-2 text-purple"></i>Promotions</h4>
            <button class="btn btn-purple" data-bs-toggle="modal" data-bs-target="#modalCreer">
                <i class="bi bi-plus-lg me-1"></i>Créer une promotion
            </button>
        </div>

        <div class="row g-4">
            <div th:if="${promotions == null or promotions.isEmpty()}" class="col-12">
                <div class="card text-center py-5">
                    <div class="text-muted"><i class="bi bi-tag fs-1 d-block mb-2"></i>Aucune promotion active</div>
                </div>
            </div>
            <div class="col-md-6 col-xl-4" th:each="p : ${promotions}">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <div class="badge bg-light text-dark border fw-bold fs-6 mb-1" th:text="${p.get('codePromo')}">CODE</div>
                                <div class="text-muted small" th:text="${p.get('description')}">–</div>
                            </div>
                            <div class="fw-bold fs-5 text-purple"
                                 th:text="${p.get('typeReduction') == 'POURCENTAGE' ? p.get('valeur') + ' %' : p.get('valeur') + ' €'}">–</div>
                        </div>
                        <div class="row text-muted small g-2">
                            <div class="col-6">
                                <i class="bi bi-calendar-event me-1"></i>Début : <span th:text="${p.get('dateDebut')}">–</span>
                            </div>
                            <div class="col-6">
                                <i class="bi bi-calendar-x me-1"></i>Fin : <span th:text="${p.get('dateFin')}">–</span>
                            </div>
                            <div class="col-12" th:if="${p.get('nbUtilisations') != null}">
                                <i class="bi bi-bar-chart me-1"></i>Utilisée <span th:text="${p.get('nbUtilisations')}">0</span> fois
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
                        <span class="badge bg-success" th:if="${p.get('active')}">Active</span>
                        <span class="badge bg-secondary" th:unless="${p.get('active')}">Expirée</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal créer promotion -->
<div class="modal fade" id="modalCreer" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-tag me-2"></i>Créer une promotion</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/promotions/creer}" method="post">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Code promo *</label>
                            <input type="text" name="codePromo" class="form-control text-uppercase" placeholder="SUMMER25" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Description</label>
                            <input type="text" name="description" class="form-control" placeholder="Soldes d'été"/>
                        </div>
                        <div class="col-8">
                            <label class="form-label fw-semibold">Valeur *</label>
                            <input type="number" name="valeur" class="form-control" step="0.01" min="0" required/>
                        </div>
                        <div class="col-4">
                            <label class="form-label fw-semibold">Type *</label>
                            <select name="typeReductionId" class="form-select" required>
                                <option th:each="t : ${typesReduction}" th:value="${t.get('id')}" th:text="${t.get('code')}">–</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Date début *</label>
                            <input type="date" name="dateDebut" class="form-control" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Date fin *</label>
                            <input type="date" name="dateFin" class="form-control" required/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-purple"><i class="bi bi-check-lg me-1"></i>Créer</button>
                </div>
            </form>
        </div>
    </div>
</div>
</main>
</html>
