<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Planning', ~{::main})}">
<main>
<div class="d-flex" style="min-height:calc(100vh - 56px)">
    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-calendar3 me-2 text-purple"></i>Planning des employés</h4>
            <button class="btn btn-purple" data-bs-toggle="modal" data-bs-target="#modalCreer">
                <i class="bi bi-plus-lg me-1"></i>Ajouter un créneau
            </button>
        </div>

        <!-- Filtres -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/planning}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Employé</label>
                        <select name="employeId" class="form-select">
                            <option value="">Tous les employés</option>
                            <option th:each="emp : ${employes?.get('content')}"
                                    th:value="${emp.get('id')}"
                                    th:text="${emp.get('prenom')} + ' ' + ${emp.get('nom')}"
                                    th:selected="${emp.get('id') == employeId}">–</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small">Du</label>
                        <input type="date" name="debut" class="form-control" th:value="${debut}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold small">Au</label>
                        <input type="date" name="fin" class="form-control" th:value="${fin}"/>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-purple w-100" style="border-color:#7c3aed;color:#7c3aed">
                            <i class="bi bi-search me-1"></i>Filtrer
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tableau planning -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Employé</th>
                                <th>Date</th>
                                <th>Heure début</th>
                                <th>Heure fin</th>
                                <th>Durée</th>
                                <th>Statut</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${plannings == null or plannings.isEmpty()}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>Aucun créneau planifié
                                </td>
                            </tr>
                            <tr th:each="p : ${plannings}">
                                <td>
                                    <div class="fw-semibold small" th:text="${p.get('prenomEmploye')} + ' ' + ${p.get('nomEmploye')}">–</div>
                                </td>
                                <td class="fw-semibold" th:text="${p.get('dateTravail')}">–</td>
                                <td th:text="${p.get('heureDebut')}">–</td>
                                <td th:text="${p.get('heureFin')}">–</td>
                                <td class="text-muted small" th:text="${p.get('duree')} ?: '–'">–</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${p.get('statut') == 'PRESENT' ? 'bg-success' : (p.get('statut') == 'ABSENT' ? 'bg-danger' : (p.get('statut') == 'CONGE' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                                          th:text="${p.get('statut')}">–</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/planning/supprimer/{id}(id=${p.get('id')})}" method="post"
                                          onsubmit="return confirm('Supprimer ce créneau ?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal créer créneau -->
<div class="modal fade" id="modalCreer" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-calendar-plus me-2"></i>Nouveau créneau</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/planning/creer}" method="post">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Employé *</label>
                            <select name="employeId" class="form-select" required>
                                <option value="">– Choisir –</option>
                                <option th:each="emp : ${employes?.get('content')}"
                                        th:value="${emp.get('id')}"
                                        th:text="${emp.get('prenom')} + ' ' + ${emp.get('nom')}">–</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Statut *</label>
                            <select name="statutPlanningId" class="form-select" required>
                                <option value="">– Choisir –</option>
                                <option th:each="s : ${statuts}" th:value="${s.get('id')}" th:text="${s.get('code')}">–</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Date *</label>
                            <input type="date" name="dateTravail" class="form-control" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Heure début *</label>
                            <input type="time" name="heureDebut" class="form-control" value="09:00" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Heure fin *</label>
                            <input type="time" name="heureFin" class="form-control" value="18:00" required/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-purple"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
</main>
</html>
