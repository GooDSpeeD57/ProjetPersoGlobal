<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Audit', ~{::main})}">
<main>
<div class="d-flex" style="min-height:calc(100vh - 56px)">
    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
    <div class="flex-grow-1 p-4">

        <h4 class="fw-bold mb-4"><i class="bi bi-journal-text me-2 text-purple"></i>Journal d'audit</h4>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Date / Heure</th>
                                <th>Utilisateur</th>
                                <th>Type</th>
                                <th>Action</th>
                                <th>Détail</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${logs == null or logs.isEmpty()}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-journal-x fs-1 d-block mb-2"></i>Aucune entrée d'audit
                                </td>
                            </tr>
                            <tr th:each="log : ${logs}">
                                <td class="text-muted small font-monospace" th:text="${log.get('dateAction')}">–</td>
                                <td>
                                    <div class="fw-semibold small" th:text="${log.get('nomUtilisateur')}">–</div>
                                    <small class="text-muted" th:text="${log.get('typeUtilisateur')}">–</small>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${log.get('typeAction') == 'CREATION' ? 'bg-success' :
                                                          (log.get('typeAction') == 'SUPPRESSION' ? 'bg-danger' :
                                                          (log.get('typeAction') == 'MODIFICATION' ? 'bg-warning text-dark' : 'bg-secondary'))}"
                                          th:text="${log.get('typeAction')}">–</span>
                                </td>
                                <td class="small fw-semibold" th:text="${log.get('action')}">–</td>
                                <td class="text-muted small" style="max-width:300px" th:text="${log.get('detail')}">–</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</html>
