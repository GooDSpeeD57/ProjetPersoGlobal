<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' – BoutiqueJeux'">BoutiqueJeux</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        :root { --bj-dark:#0f0f1a; --bj-purple:#7c3aed; --bj-purple-light:#a78bfa; --bj-gold:#f59e0b; }
        body { background:#f8f9fa; }
        .navbar-brand span { color:var(--bj-purple-light); }
        .navbar { background:var(--bj-dark) !important; }
        .nav-link { color:#ccc !important; }
        .nav-link:hover, .nav-link.active { color:#fff !important; }
        .badge-ultimate { background:linear-gradient(135deg,var(--bj-purple),var(--bj-gold)); color:#fff; font-size:.65rem; padding:2px 6px; border-radius:10px; vertical-align:middle; }
        .sidebar { min-height:calc(100vh - 56px); background:var(--bj-dark); }
        .sidebar .nav-link { color:#aaa !important; border-radius:6px; margin-bottom:2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background:#7c3aed22; color:#fff !important; }
        .sidebar .nav-link i { width:20px; }
        .card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
        .card-header { border-radius:12px 12px 0 0 !important; }
        .btn-purple { background:var(--bj-purple); border-color:var(--bj-purple); color:#fff; }
        .btn-purple:hover { background:#6d28d9; border-color:#6d28d9; color:#fff; }
        .table th { font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:#888; font-weight:600; }
        .alert { border-radius:10px; }
        footer { background:var(--bj-dark); color:#888; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">🎮 Boutique<span>Jeux</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/catalogue}"><i class="bi bi-grid me-1"></i>Catalogue</a></li>
                <li class="nav-item" th:if="${session.jwt != null}"><a class="nav-link" th:href="@{/garanties}"><i class="bi bi-shield-check me-1"></i>Garanties</a></li>
                <li class="nav-item" th:if="${session.jwt != null and session.userType == 'CLIENT'}"><a class="nav-link" th:href="@{/abonnement}"><i class="bi bi-star me-1"></i>Ultimate</a></li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-2" th:if="${session.jwt != null}">
                    <a class="nav-link" th:href="@{/panier}"><i class="bi bi-cart3"></i></a>
                </li>
                <!-- Connecté -->
                <li class="nav-item dropdown" th:if="${session.jwt != null}">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.prenomUtilisateur}">Utilisateur</span>
                        <span th:if="${session.userType == 'CLIENT' and session.isUltimate}" class="badge-ultimate ms-1">ULTIMATE</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li th:if="${session.userType == 'CLIENT'}"><a class="dropdown-item" th:href="@{/compte}"><i class="bi bi-person me-2"></i>Mon compte</a></li>
                        <li th:if="${session.userType != 'CLIENT'}"><a class="dropdown-item" th:href="@{/admin}"><i class="bi bi-gear me-2"></i>Administration</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/auth/logout}"><i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
                    </ul>
                </li>
                <!-- Non connecté -->
                <li class="nav-item" th:unless="${session.jwt != null}">
                    <a class="btn btn-purple btn-sm" th:href="@{/auth/login}">Connexion</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ALERTS FLASH -->
<div class="container mt-2" th:if="${successMessage != null or errorMessage != null}">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- CONTENU PRINCIPAL -->
<th:block th:replace="${content}"/>

<!-- FOOTER -->
<footer class="mt-5 py-4 text-center">
    <small>&copy; 2025 BoutiqueJeux – Tous droits réservés</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
