<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head('Panier')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
  <div class="container">
    <div class="section-label">// MON PANIER</div>
    <div class="section-title">Panier</div>

    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <!-- PANIER VIDE -->
    <div th:if="${panier == null or panier.isEmpty()}"
         style="text-align:center;padding:5rem 2rem">
      <div style="font-size:5rem;margin-bottom:1.5rem;opacity:0.3">🛒</div>
      <div style="font-family:var(--font-head);letter-spacing:3px;color:var(--text-dim);margin-bottom:2rem">
        Votre panier est vide
      </div>
      <a class="btn btn-primary" th:href="@{/catalogue}">Voir le catalogue</a>
    </div>

    <!-- PANIER AVEC ARTICLES -->
    <div class="cart-layout" th:if="${panier != null and !panier.isEmpty()}">

      <!-- LISTE ARTICLES -->
      <div>
        <div class="cart-item" th:each="item : ${panier}">
          <div class="cart-item-img">🎮</div>
          <div class="cart-item-info">
            <div class="cart-item-name" th:text="${item.nom}"></div>
            <div class="cart-item-meta">
              <form th:action="@{/panier/quantite}" method="post" style="display:inline-flex;align-items:center;gap:0.5rem">
                <input type="hidden" name="produitId" th:value="${item.produitId}"/>
                <button type="button" class="btn btn-sm btn-secondary"
                        onclick="changeQty(this.nextElementSibling, -1);this.closest('form').submit()"
                        style="padding:0.2rem 0.6rem">−</button>
                <input type="number" name="quantite" th:value="${item.quantite}"
                       class="form-control" min="1" max="99"
                       style="width:60px;text-align:center;padding:0.2rem 0.5rem"/>
                <button type="button" class="btn btn-sm btn-primary"
                        onclick="changeQty(this.previousElementSibling, 1);this.closest('form').submit()"
                        style="padding:0.2rem 0.6rem">+</button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              </form>
            </div>
          </div>
          <div class="cart-item-price"
               th:text="${#numbers.formatDecimal(item.prix * item.quantite, 1, 2)} + ' €'"></div>
          <form th:action="@{/panier/retirer}" method="post" style="margin:0">
            <input type="hidden" name="produitId" th:value="${item.produitId}"/>
            <button type="submit" style="background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;transition:color 0.2s"
                    onmouseover="this.style.color='var(--accent2)'"
                    onmouseout="this.style.color='var(--text-dim)'">✕</button>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </form>
        </div>

        <!-- VIDER LE PANIER -->
        <form th:action="@{/panier/vider}" method="post" style="margin-top:1rem">
          <button type="submit" class="btn btn-secondary btn-sm">Vider le panier</button>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
      </div>

      <!-- RÉCAPITULATIF -->
      <div class="cart-summary card-accent-top">
        <div style="font-family:var(--font-head);font-size:0.7rem;letter-spacing:3px;
                    text-transform:uppercase;margin-bottom:1.5rem;padding-bottom:1rem;
                    border-bottom:1px solid var(--border)">
          Récapitulatif
        </div>
        <div class="summary-row">
          <span>Articles (<span th:text="${totalQuantite}">0</span>)</span>
          <span th:text="${#numbers.formatDecimal(totalPrix, 1, 2)} + ' €'">0.00 €</span>
        </div>
        <div class="summary-row">
          <span>Livraison</span>
          <span style="color:var(--success)">Gratuite</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span th:text="${#numbers.formatDecimal(totalPrix, 1, 2)} + ' €'">0.00 €</span>
        </div>
        <form th:action="@{/panier/valider}" method="post" style="margin-top:1rem">
          <button type="submit" class="btn btn-primary btn-full">
            Valider la commande
          </button>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
      </div>
    </div>

  </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
