<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Gestion Employés', ~{::main})}">
<main>
<div class="d-flex" style="min-height:calc(100vh - 56px)">
    <div th:replace="~{fragments/sidebar-admin :: sidebar}"></div>
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-people me-2 text-purple"></i>Gestion des employés</h4>
            <button class="btn btn-purple" data-bs-toggle="modal" data-bs-target="#modalCreer">
                <i class="bi bi-plus-lg me-1"></i>Nouvel employé
            </button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Employé</th>
                                <th>Email</th>
                                <th>Rôle</th>
                                <th>Magasin</th>
                                <th>Date embauche</th>
                                <th>Statut</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${employes == null or (employes.get('content') == null and employes.get('totalElements') == null)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-people fs-1 d-block mb-2"></i>Aucun employé
                                </td>
                            </tr>
                            <tr th:each="emp : ${employes?.get('content')}">
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div style="width:36px;height:36px;background:#7c3aed22;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#7c3aed;font-size:.85rem"
                                             th:text="${emp.get('prenom')?.toString()?.substring(0,1)} + ${emp.get('nom')?.toString()?.substring(0,1)}">AB</div>
                                        <div>
                                            <div class="fw-semibold small" th:text="${emp.get('prenom')} + ' ' + ${emp.get('nom')}">–</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-muted small" th:text="${emp.get('email')}">–</td>
                                <td>
                                    <span class="badge bg-purple-subtle text-purple" style="background:#7c3aed22;color:#7c3aed" th:text="${emp.get('role')}">–</span>
                                </td>
                                <td class="small" th:text="${emp.get('magasin')}">–</td>
                                <td class="text-muted small" th:text="${emp.get('dateEmbauche')}">–</td>
                                <td>
                                    <span class="badge bg-success" th:if="${emp.get('actif')}">Actif</span>
                                    <span class="badge bg-secondary" th:unless="${emp.get('actif')}">Inactif</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/employes/supprimer/{id}(id=${emp.get('id')})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Désactiver cet employé ?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" th:if="${emp.get('actif')}">
                                            <i class="bi bi-person-x"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal créer employé -->
<div class="modal fade" id="modalCreer" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-person-plus me-2"></i>Créer un employé</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/employes/creer}" method="post">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Prénom *</label>
                            <input type="text" name="prenom" class="form-control" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Nom *</label>
                            <input type="text" name="nom" class="form-control" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Email *</label>
                            <input type="email" name="email" class="form-control" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Mot de passe *</label>
                            <input type="password" name="motDePasse" class="form-control" minlength="8" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Rôle *</label>
                            <select name="roleId" class="form-select" required>
                                <option value="">– Choisir –</option>
                                <option th:each="r : ${roles}" th:value="${r.get('id')}" th:text="${r.get('code')}">–</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Magasin *</label>
                            <select name="magasinId" class="form-select" required>
                                <option value="">– Choisir –</option>
                                <option th:each="m : ${magasins}" th:value="${m.get('id')}" th:text="${m.get('nom')}">–</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Date d'embauche *</label>
                            <input type="date" name="dateEmbauche" class="form-control" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-purple"><i class="bi bi-check-lg me-1"></i>Créer</button>
                </div>
            </form>
        </div>
    </div>
</div>
</main>
</html>
