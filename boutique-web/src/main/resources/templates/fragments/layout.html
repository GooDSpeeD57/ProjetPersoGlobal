<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ═══════════════ FRAGMENT : head(title) ═══════════════ -->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} + ' – BoutiqueJeux'">BoutiqueJeux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>

<!-- ═══════════════ FRAGMENT : navbar ═══════════════ -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/}">🎮 Boutique<span>Jeux</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/catalogue}"><i class="bi bi-grid me-1"></i>Catalogue</a>
        </li>
        <li class="nav-item" th:if="${session.jwt != null}">
          <a class="nav-link" th:href="@{/garanties}"><i class="bi bi-shield-check me-1"></i>Garanties</a>
        </li>
        <li class="nav-item" th:if="${session.jwt != null and session.userType == 'CLIENT'}">
          <a class="nav-link" th:href="@{/abonnement}"><i class="bi bi-star me-1"></i>Ultimate</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-2" th:if="${session.jwt != null}">
          <a class="nav-link" th:href="@{/panier}"><i class="bi bi-cart3"></i></a>
        </li>
        <li class="nav-item dropdown" th:if="${session.jwt != null}">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>
            <span th:text="${session.prenomUtilisateur}">Utilisateur</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li th:if="${session.userType == 'CLIENT'}">
              <a class="dropdown-item" th:href="@{/compte}"><i class="bi bi-person me-2"></i>Mon compte</a>
            </li>
            <li th:if="${session.userType != 'CLIENT'}">
              <a class="dropdown-item" th:href="@{/admin}"><i class="bi bi-gear me-2"></i>Administration</a>
            </li>
            <li><hr class="dropdown-divider"/></li>
            <li>
              <a class="dropdown-item text-danger" th:href="@{/auth/logout}">
                <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
              </a>
            </li>
          </ul>
        </li>
        <li class="nav-item" th:unless="${session.jwt != null}">
          <a class="btn btn-sm ms-2" style="background:var(--accent);color:#fff" th:href="@{/auth/login}">Connexion</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ═══════════════ FRAGMENT : alerts ═══════════════ -->
<div th:fragment="alerts" class="container mt-2" th:if="${successMessage != null or errorMessage != null}">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<!-- ═══════════════ FRAGMENT : footer ═══════════════ -->
<footer th:fragment="footer" class="mt-5 py-4 text-center" style="background:#0f0f1a;color:#888">
  <small>&copy; 2025 BoutiqueJeux – Tous droits réservés</small>
</footer>

<!-- ═══════════════ FRAGMENT : scripts ═══════════════ -->
<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
